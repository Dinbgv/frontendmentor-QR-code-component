<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Qrcode site</title>
  <link rel="stylesheet" href="style.css">

  <link rel="shortcut icon" href="assets/QR.svg" type="image/x-icon">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">

</head>
<body>
  <div class="container">
    <div class="container__bgqr">
      <img src="assets/QR.svg" alt="QR code" class = "container__bg--img">

    </div>
    <p class="title">Improve your front-end skills by building projects</p>
    <p class="text">Scan the QR code to visit Frontend Mentor and take your coding skills to the next level</p>
  </div>
</body>
</html>
