<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog preview card</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/svg+xml" href="assets/images/favicon-32x32.png">
</head>
<body>
    <div class="card">
        <img src="assets/images/illustration-article.svg" alt="illustration-article" class="illustration-article">
        <div class="content">
            <div class="category"><span class="category__text">Learning</span></div>
            <span class="date">Published 21 Dec 2023</span>
            <p class="title">HTML & CSS foundations</p>
            <p class="text">These languages are the backbone of every website, defining structure, content, and presentation.</p>
        </div>
        <div class="author">
            <img src="assets/images/image-avatar.webp" alt="avatar-michelle" class="avatar">
            <span class="name-author">Greg Hooper</span>
        </div>
    </div>
</body>
</html>
